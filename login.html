{% extends "base.html" %}
{% block title %}Login - Course Management System{% endblock %}
{% block content %}

<section class="auth-section">
    <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="auth-subtitle">Login to continue your learning journey</p>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>

        <p class="auth-footer">Don't have an account? <a href="{{ url_for('register') }}">Sign up</a></p>
        <p class="auth-hint">Admin demo: admin@cms.com / admin123</p>
    </div>
</section>

{% endblock %}
